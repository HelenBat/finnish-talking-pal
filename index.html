<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finnish Talking Pal 🇫🇮 - AI Tutor</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f4f8;
            max-width: 600px;
            margin: 0 auto;
        }
        button {
            background: #0055a4;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            border-radius: 60px;
            margin: 20px;
            cursor: pointer;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 20px;
            text-align: left;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status {
            color: #666;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        .listen-btn {
            background: #2e7d32;
            padding: 12px 24px;
            font-size: 1rem;
            margin-top: 10px;
        }
        input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 12px;
            margin: 10px 0;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0055a4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🇫🇮 Finnish Talking Pal Pro</h1>
    <p>AI Tutor that learns from YOUR materials</p>
    
    <button id="recordBtn">🎤 Speak Finnish</button>
    
    <div class="box">
        <h3>📝 You said:</h3>
        <div id="transcript">—</div>
    </div>
    
    <div class="box">
        <h3>💬 AI Tutor Response:</h3>
        <div id="response">Ready. Tap the microphone and speak Finnish!</div>
        <button id="speakBtn" class="listen-btn">🔊 Listen to Response</button>
        <button id="autoSpeakBtn" class="listen-btn" style="background:#00695c;">🔁 Auto-speak ON</button>
    </div>
    
    <div class="box">
        <h3>📚 Your Learning Materials</h3>
        <input type="file" id="materialUpload" accept=".txt,.pdf">
        <div id="materialStatus">No materials uploaded yet</div>
    </div>
    
    <div class="status" id="status">Ready</div>

    <script>
       
        const GEMINI_API_KEY = "AIzaSyDiaGG8a02xT76H6HLUfZFEa5xLopf9QrY";  
        
        // ============================================
        // SPEECH RECOGNITION
        // ============================================
        const recordBtn = document.getElementById('recordBtn');
        const transcriptDiv = document.getElementById('transcript');
        const responseDiv = document.getElementById('response');
        const speakBtn = document.getElementById('speakBtn');
        const autoSpeakBtn = document.getElementById('autoSpeakBtn');
        const statusDiv = document.getElementById('status');
        const materialUpload = document.getElementById('materialUpload');
        const materialStatus = document.getElementById('materialStatus');
        
        let recognition = null;
        let autoSpeak = true;
        let userMaterials = "";  // Stores your uploaded learning materials
        
        // Toggle auto-speak
        autoSpeakBtn.onclick = () => {
            autoSpeak = !autoSpeak;
            autoSpeakBtn.textContent = autoSpeak ? "🔁 Auto-speak ON" : "🔇 Auto-speak OFF";
            autoSpeakBtn.style.background = autoSpeak ? "#00695c" : "#757575";
        };
        
        // Upload your learning materials
        materialUpload.onchange = async (event) => {
            const file = event.target.files[0];
            if (!file) return;
            
            materialStatus.innerHTML = "📖 Loading your materials...";
            
            if (file.type === "text/plain") {
                const text = await file.text();
                userMaterials = text;
                materialStatus.innerHTML = `✅ Loaded: ${file.name} (${text.length} characters)`;
            } else if (file.type === "application/pdf") {
                // For PDF, you'd need a PDF parser library
                materialStatus.innerHTML = "⚠️ PDF support coming soon. Use .txt files for now.";
            } else {
                materialStatus.innerHTML = "❌ Please upload a .txt file";
            }
        };
        
        // AI response using Google Gemini (FREE)
        async function getAIResponse(userText) {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "YOUR_API_KEY_HERE") {
                // Fallback to simple responses if no API key
                return fallbackResponse(userText);
            }
            
            try {
                statusDiv.innerHTML = "🤖 AI is thinking...";
                
                // Build prompt with user's learning materials if uploaded
                let systemPrompt = `You are a friendly Finnish language tutor. The student is practicing spoken Finnish.
                
Rules:
1. Respond in Finnish (use English only if student is absolute beginner)
2. Keep responses short (1-2 sentences for beginners, 2-3 for intermediates)
3. If the student makes an error, gently correct it
4. Be encouraging and positive
5. Ask a follow-up question to continue the conversation`;

                if (userMaterials) {
                    systemPrompt += `\n\nUse these learning materials as your primary source for vocabulary and grammar:\n${userMaterials.substring(0, 3000)}`;
                }
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `${systemPrompt}\n\nStudent said: "${userText}"\n\nYour response as tutor:`
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.7,
                            maxOutputTokens: 150
                        }
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    console.error("API Error:", data.error);
                    return fallbackResponse(userText);
                }
                
                const aiResponse = data.candidates[0].content.parts[0].text;
                return aiResponse;
                
            } catch (error) {
                console.error("AI Error:", error);
                return fallbackResponse(userText);
            }
        }
        
        function fallbackResponse(userText) {
            const text = userText.toLowerCase();
            if (text.includes('hei') || text.includes('terve')) {
                return "Hei! Mitä kuuluu? Olen iloinen että harjoittelet suomea!";
            }
            if (text.includes('kiitos')) {
                return "Ole hyvä! Oletko oppinut uusia sanoja tänään?";
            }
            if (text.includes('anteeksi')) {
                return "Ei hätää! Harjoitteleminen on tärkeää. Sano uudestaan?";
            }
            return `Kuulin: "${userText}". Hyvä! Jatketaan harjoittelua. Voit kysyä minulta mitä vain suomeksi!`;
        }
        
        // Text-to-speech
        function speakFinnish(text) {
            if (!window.speechSynthesis) return;
            
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fi-FI';
            utterance.rate = 0.85;
            utterance.pitch = 1.0;
            
            // Try to get Finnish voice
            const voices = window.speechSynthesis.getVoices();
            const finnishVoice = voices.find(v => v.lang === 'fi-FI');
            if (finnishVoice) utterance.voice = finnishVoice;
            
            window.speechSynthesis.speak(utterance);
        }
        
        // Speech recognition setup
        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'fi-FI';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                statusDiv.innerHTML = '🎙️ Listening... Speak Finnish';
                recordBtn.style.opacity = '0.5';
            };
            
            recognition.onend = () => {
                statusDiv.innerHTML = '✅ Listening stopped';
                recordBtn.style.opacity = '1';
            };
            
            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                transcriptDiv.innerHTML = userText;
                statusDiv.innerHTML = '📝 Recognizing...';
                
                // Get AI response
                const aiResponse = await getAIResponse(userText);
                responseDiv.innerHTML = aiResponse;
                
                // Auto-speak if enabled
                if (autoSpeak) {
                    speakFinnish(aiResponse);
                    statusDiv.innerHTML = '🔊 Speaking response...';
                } else {
                    statusDiv.innerHTML = '✅ Response ready. Tap green button to hear it.';
                }
            };
            
            recognition.onerror = (event) => {
                statusDiv.innerHTML = `* Error: ${event.error}. Try again.`;
                recordBtn.style.opacity = '1';
            };
            
            recordBtn.onclick = () => {
                try {
                    recognition.start();
                } catch(e) {
                    statusDiv.innerHTML = 'Error: ' + e.message;
                }
            };
        } else {
            statusDiv.innerHTML = ' Speech recognition not supported. Use Chrome on Android.';
            recordBtn.disabled = true;
        }
        
        speakBtn.onclick = () => {
            const text = responseDiv.innerText;
            if (text && text !== 'Ready. Tap the microphone and speak Finnish!') {
                speakFinnish(text);
            }
        };
        
        // Load voices
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
        }
        
        statusDiv.innerHTML = '✅ Ready! Tap microphone and speak Finnish.';
    </script>
</body>
</html>
