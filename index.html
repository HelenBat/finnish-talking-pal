<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finnish AI Tutor 🇫🇮</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #003580;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #555;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .mic-button {
            background: #0055a4;
            color: white;
            border: none;
            padding: 30px 60px;
            font-size: 3rem;
            border-radius: 100px;
            margin: 20px auto;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
            display: block;
        }
        .mic-button:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .mic-button:disabled {
            opacity: 0.5;
            transform: none;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 20px 0;
            border-radius: 24px;
            text-align: left;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            color: #003580;
            font-size: 1.1rem;
        }
        .transcript-text {
            font-size: 1.2rem;
            line-height: 1.5;
            min-height: 70px;
            color: #1a1a2e;
            font-weight: 500;
        }
        .response-text {
            font-size: 1rem;
            line-height: 1.5;
            min-height: 90px;
            color: #1a5d1a;
        }
        .status {
            color: #555;
            font-size: 0.85rem;
            margin-top: 15px;
            padding: 10px;
            border-radius: 40px;
            background: white;
            text-align: center;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .listen-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            transition: background 0.2s;
        }
        .listen-btn:active {
            background: #1b5e20;
        }
        .auto-btn {
            background: #00695c;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            border-radius: 40px;
            cursor: pointer;
            flex: 1;
            transition: background 0.2s;
        }
        .auto-btn:active {
            background: #004d40;
        }
        .test-btn {
            background: #ff6f00;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.85rem;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #0055a4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        footer {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #888;
            text-align: center;
        }
        .api-status {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }
        .api-online {
            background: #c8e6c9;
            color: #2e7d32;
        }
        .api-offline {
            background: #ffcdd2;
            color: #c62828;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span>🇫🇮</span> Finnish AI Tutor
    </h1>
    <div class="subtitle">Speak Finnish • Get AI Feedback • Improve</div>
    
    <div id="apiStatus" class="api-status api-offline">🔌 Checking API...</div>
    
    <button class="mic-button" id="recordBtn">🎤</button>
    
    <div class="box">
        <h3>📝 You said:</h3>
        <div class="transcript-text" id="transcript">—</div>
    </div>
    
    <div class="box">
        <h3>💬 AI Tutor:</h3>
        <div class="response-text" id="response">Tap the 🎤 button and speak Finnish.</div>
        <div class="button-group">
            <button id="speakBtn" class="listen-btn">🔊 Listen</button>
            <button id="autoSpeakBtn" class="auto-btn">🔁 Auto ON</button>
        </div>
    </div>
    
    <div class="status" id="status">✅ Ready. Tap microphone to start.</div>
    <footer>Speak clearly in Finnish. The AI will respond in Finnish.</footer>
</div>

<script>
    // ============================================
    // CONFIGURATION
    // ============================================
    // REPLACE THIS WITH YOUR RENDER BACKEND URL
    const API_URL = "https://finnish-api.onrender.com";
    
    // ============================================
    // DOM ELEMENTS
    // ============================================
    const recordBtn = document.getElementById('recordBtn');
    const transcriptDiv = document.getElementById('transcript');
    const responseDiv = document.getElementById('response');
    const speakBtn = document.getElementById('speakBtn');
    const autoSpeakBtn = document.getElementById('autoSpeakBtn');
    const statusDiv = document.getElementById('status');
    const apiStatusDiv = document.getElementById('apiStatus');
    
    let recognition = null;
    let autoSpeak = true;
    
    // ============================================
    // CHECK API HEALTH ON PAGE LOAD
    // ============================================
    async function checkAPI() {
        try {
            const response = await fetch(API_URL.replace('/api/chat', ''), {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });
            if (response.ok) {
                apiStatusDiv.innerHTML = '✅ API Online';
                apiStatusDiv.className = 'api-status api-online';
            } else {
                apiStatusDiv.innerHTML = '⚠️ API Error';
                apiStatusDiv.className = 'api-status api-offline';
            }
        } catch (error) {
            apiStatusDiv.innerHTML = '❌ API Offline - Check Render';
            apiStatusDiv.className = 'api-status api-offline';
            console.error("API check failed:", error);
        }
    }
    
    // ============================================
    // AI RESPONSE VIA YOUR BACKEND
    // ============================================
    async function getAIResponse(userText) {
        try {
            statusDiv.innerHTML = "🤖 AI is thinking...";
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userText: userText })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.reply) {
                statusDiv.innerHTML = "✅ Response received";
                return data.reply;
            } else if (data.error) {
                throw new Error(data.error);
            } else {
                throw new Error("Invalid response from server");
            }
            
        } catch (error) {
            console.error("API Error:", error);
            statusDiv.innerHTML = `⚠️ API Error: ${error.message}`;
            return getFallbackResponse(userText);
        }
    }
    
    // Fallback responses when backend is unavailable
    function getFallbackResponse(userText) {
        const text = userText.toLowerCase();
        if (text.includes('hei') || text.includes('terve') || text.includes('moi')) {
            return "Hei! Mitä kuuluu? Olen iloinen että harjoittelet suomea!";
        }
        if (text.includes('kiitos')) {
            return "Ole hyvä! Oletko oppinut uusia sanoja tänään?";
        }
        if (text.includes('anteeksi')) {
            return "Ei hätää! Harjoitteleminen on tärkeää. Voitko sanoa uudestaan?";
        }
        if (text.includes('kuuluu')) {
            return "Minulle kuuluu hyvää! Kiitos kysymästä. Entä sinulle?";
        }
        if (text.includes('suomi') || text.includes('suomea')) {
            return "Suomi on kaunis kieli! Jatka harjoittelua, olet hyvä!";
        }
        if (text.includes('nimi')) {
            return "Minun nimeni on Suomen AI-opettaja. Mikä on sinun nimesi?";
        }
        return `Kuulin: "${userText}". Hyvä! Jatketaan suomen harjoittelua. Kysy minulta mitä vain!`;
    }
    
    // ============================================
    // TEXT TO SPEECH (Finnish)
    // ============================================
    function speakFinnish(text) {
        if (!window.speechSynthesis) {
            console.log("Speech synthesis not supported");
            return;
        }
        
        // Cancel any ongoing speech
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fi-FI';
        utterance.rate = 0.85;
        utterance.pitch = 1.0;
        
        // Try to find a Finnish voice
        const voices = window.speechSynthesis.getVoices();
        const finnishVoice = voices.find(voice => voice.lang === 'fi-FI');
        if (finnishVoice) {
            utterance.voice = finnishVoice;
        }
        
        utterance.onstart = () => {
            if (!autoSpeak) statusDiv.innerHTML = "🔊 Speaking...";
        };
        
        utterance.onend = () => {
            if (!autoSpeak) statusDiv.innerHTML = "✅ Ready for next phrase";
        };
        
        window.speechSynthesis.speak(utterance);
    }
    
    // ============================================
    // SPEECH RECOGNITION (Finnish)
    // ============================================
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'fi-FI';
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        
        recognition.onstart = () => {
            statusDiv.innerHTML = "🎙️ Listening... Speak Finnish now";
            recordBtn.style.opacity = '0.6';
            transcriptDiv.innerHTML = "...";
        };
        
        recognition.onend = () => {
            recordBtn.style.opacity = '1';
            if (statusDiv.innerHTML.includes("Listening")) {
                statusDiv.innerHTML = "⏹️ Stopped listening";
            }
        };
        
        recognition.onresult = async (event) => {
            const userText = event.results[0][0].transcript;
            transcriptDiv.innerHTML = userText;
            statusDiv.innerHTML = `📝 Recognized: "${userText}"`;
            
            // Show loading in response area
            responseDiv.innerHTML = '<span class="loading"></span> AI is thinking...';
            
            // Get AI response from backend
            const aiResponse = await getAIResponse(userText);
            responseDiv.innerHTML = aiResponse;
            
            // Auto-speak if enabled
            if (autoSpeak) {
                speakFinnish(aiResponse);
                statusDiv.innerHTML = "🔊 Speaking response...";
            } else {
                statusDiv.innerHTML = "✅ Response ready. Tap 'Listen' to hear it.";
            }
        };
        
        recognition.onerror = (event) => {
            console.error("Recognition error:", event.error);
            
            if (event.error === 'not-allowed') {
                statusDiv.innerHTML = "❌ Microphone access denied. Check Chrome permissions.";
            } else if (event.error === 'no-speech') {
                statusDiv.innerHTML = "❌ No speech detected. Try again and speak clearly.";
            } else {
                statusDiv.innerHTML = `❌ Error: ${event.error}. Try again.`;
            }
            recordBtn.style.opacity = '1';
        };
        
        recordBtn.onclick = () => {
            try {
                recognition.start();
            } catch (e) {
                statusDiv.innerHTML = `Error: ${e.message}`;
            }
        };
        
    } else {
        statusDiv.innerHTML = "❌ Speech recognition not supported. Use Chrome on Android.";
        recordBtn.disabled = true;
        recordBtn.style.opacity = '0.5';
    }
    
    // ============================================
    // BUTTON HANDLERS
    // ============================================
    speakBtn.onclick = () => {
        const responseText = responseDiv.innerText;
        if (responseText && !responseText.includes("Tap the") && !responseText.includes("thinking")) {
            speakFinnish(responseText);
            statusDiv.innerHTML = "🔊 Speaking...";
        } else {
            statusDiv.innerHTML = "No response to speak yet. Speak into microphone first.";
        }
    };
    
    autoSpeakBtn.onclick = () => {
        autoSpeak = !autoSpeak;
        autoSpeakBtn.textContent = autoSpeak ? "🔁 Auto ON" : "🔇 Auto OFF";
        autoSpeakBtn.style.background = autoSpeak ? "#00695c" : "#757575";
        statusDiv.innerHTML = autoSpeak ? "Auto-speak ON - responses will be spoken automatically" : "Auto-speak OFF - tap Listen button to hear responses";
    };
    
    // Load voices when page is ready
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    }
    
    // Check API status on load
    checkAPI();
    
    console.log("Finnish AI Tutor ready! API URL:", API_URL);
</script>
</body>
</html>
